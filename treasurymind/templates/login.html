<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TreasuryMind — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0b1120;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#131d2f;border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:3rem 2.5rem;width:100%;max-width:400px;text-align:center;}
.logo{width:52px;height:52px;border-radius:13px;background:#06d6a0;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
.logo span{color:#0b1120;font-weight:800;font-size:1.4rem;}
h1{color:#fff;font-size:1.3rem;font-weight:700;margin-bottom:0.3rem;}
.subtitle{color:#8b949e;font-size:0.82rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;text-align:left;}
.form-group label{display:block;color:#8b949e;font-size:0.72rem;font-weight:500;margin-bottom:0.4rem;text-transform:uppercase;letter-spacing:0.05em;}
.form-group input{width:100%;padding:0.7rem 1rem;background:#0b1120;border:1px solid rgba(255,255,255,0.08);border-radius:10px;color:#fff;font-size:0.85rem;outline:none;transition:border 0.2s;}
.form-group input:focus{border-color:#06d6a0;}
.form-group input::placeholder{color:#4b5563;}
.btn{width:100%;padding:0.75rem;background:#06d6a0;color:#0b1120;border:none;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:all 0.2s;margin-top:0.5rem;}
.btn:hover{background:#05b88a;box-shadow:0 4px 15px rgba(6,214,160,0.3);}
.hint{color:#6b7280;font-size:0.72rem;margin-top:1.5rem;}
</style>
</head>
<body>
<div class="login-card">
    <div class="logo"><span>T</span></div>
    <h1>TreasuryMind</h1>
    <p class="subtitle">Sign in to your treasury dashboard</p>
    <form method="POST" action="/login">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Amara Khan" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" placeholder="you@company.com" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>
    <p class="hint">Demo: any credentials will work</p>
</div>
</body>
</html>
